name: Deploy StoryCloud to Cloud Run

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]

permissions:
  contents: read
  id-token: write

# Serialize runs per branch so back-to-back pushes to `stage` (or `main`)
# don't race for the Terraform state lock on gs://dfh-*-tfstate. A second
# run waits for the first to finish instead of being cancelled — we never
# want to skip a commit's deploy.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: test — runs on every push and PR.
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Lint, vet, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Guard against forbidden GitHub Actions versions
        run: |
          set -eu
          # Forbid pre-Node24 versions of actions that have a newer release.
          # google-github-actions/* latest is @v2; hashicorp/setup-terraform
          # latest is @v3 — those are the current versions and must not be
          # flagged.
          if grep -rEn '(actions/checkout|actions/setup-go|actions/cache|golangci/golangci-lint-action)@v[0-3]([^0-9]|$)' .github/workflows/ ; then
            echo "::error::Workflow references a forbidden action version. Use the Node.js 24-compatible versions listed in ARCHITECTURE.md §11 (checkout@v4, setup-go@v5, cache@v4, golangci-lint-action@v6)."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download modules
        working-directory: ./service
        run: go mod download

      - name: go vet
        working-directory: ./service
        run: go vet ./...

      - name: go test
        working-directory: ./service
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./service
          version: latest
          args: --timeout=5m

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: build-and-deploy — only on push to `stage` or `main`.
  # ────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build image, Terraform apply, smoke test
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          set -eu
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_NAME=prod"                     >> "$GITHUB_OUTPUT"
            echo "ENV_DIR=prod"                      >> "$GITHUB_OUTPUT"
            echo "VAR_FILE=prod/prod.tfvars"         >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=dfh-prod-id"            >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=storycloud-prod"      >> "$GITHUB_OUTPUT"
            echo "BUCKET_NAME=dfh-prod-storycloud-artifacts" >> "$GITHUB_OUTPUT"
          else
            echo "ENV_NAME=stage"                    >> "$GITHUB_OUTPUT"
            echo "ENV_DIR=stage"                     >> "$GITHUB_OUTPUT"
            echo "VAR_FILE=stage/stage.tfvars"       >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=dfh-stage-id"           >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=storycloud-stage"     >> "$GITHUB_OUTPUT"
            echo "BUCKET_NAME=dfh-stage-storycloud-artifacts" >> "$GITHUB_OUTPUT"
          fi

      # ─── Two separate conditional auth steps (stage vs prod) ──────────
      # A ternary on `credentials_json` triggers a known GitHub Actions
      # expression bug when the falsy branch is referenced; splitting into
      # two `if:`-guarded steps avoids it entirely.
      - name: Authenticate to Google Cloud (staging)
        if: steps.env.outputs.ENV_NAME == 'stage'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_STAGE_SA_KEY }}

      - name: Authenticate to Google Cloud (production)
        if: steps.env.outputs.ENV_NAME == 'prod'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.env.outputs.PROJECT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Compute version
        id: version
        run: |
          set -eu
          BASE_VERSION=$(cat VERSION)
          COMMIT_COUNT=$(git rev-list --all --count HEAD)
          MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1,2)
          VERSION="${MAJOR_MINOR}.${COMMIT_COUNT}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: v$VERSION"

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t "gcr.io/${{ steps.env.outputs.PROJECT_ID }}/storycloud:v${{ steps.version.outputs.VERSION }}" \
            -t "gcr.io/${{ steps.env.outputs.PROJECT_ID }}/storycloud:latest" \
            -f service/Dockerfile service/

      - name: Push Docker image
        run: |
          docker push "gcr.io/${{ steps.env.outputs.PROJECT_ID }}/storycloud:v${{ steps.version.outputs.VERSION }}"
          docker push "gcr.io/${{ steps.env.outputs.PROJECT_ID }}/storycloud:latest"

      # ─── Pre-deploy resource conflict check ──────────────────────────
      # Fail fast (with a clear message) if an unmanaged Cloud Run
      # service, Firestore DB, or GCS bucket with our target names
      # already exists in the project. Catches cross-project collisions
      # and stale resources before terraform apply has to discover them.
      - name: Pre-deploy resource conflict check
        env:
          PROJECT_ID: ${{ steps.env.outputs.PROJECT_ID }}
          SERVICE_NAME: ${{ steps.env.outputs.SERVICE_NAME }}
          BUCKET_NAME: ${{ steps.env.outputs.BUCKET_NAME }}
          DB_NAME: storycloud
        run: |
          set -eu
          echo "Pre-flight check in project=$PROJECT_ID ..."

          # Cloud Run service: only fail if a service with the exact name exists AND
          # was not created by Terraform (terraform apply is idempotent for services
          # it already owns, so a Terraform-managed conflict is actually fine).
          if gcloud run services describe "$SERVICE_NAME" \
               --region=us-central1 --project="$PROJECT_ID" >/dev/null 2>&1 ; then
            echo "::notice::Cloud Run service $SERVICE_NAME already exists in $PROJECT_ID. Terraform will update it in place."
          fi

          # Firestore DB: if a DB with our name exists AND we have no terraform state
          # for it yet, the apply will fail with "already exists". Warn loudly.
          if gcloud firestore databases describe \
               --database="$DB_NAME" --project="$PROJECT_ID" >/dev/null 2>&1 ; then
            echo "::notice::Firestore DB '$DB_NAME' already exists in $PROJECT_ID. Terraform will attempt to adopt it (import block required if not in state)."
          fi

          # GCS bucket: names are global, so this catches name collisions across
          # unrelated GCP orgs.
          if gcloud storage buckets describe "gs://$BUCKET_NAME" >/dev/null 2>&1 ; then
            OWNER_PROJECT=$(gcloud storage buckets describe "gs://$BUCKET_NAME" --format='value(project_number)' 2>/dev/null || echo "")
            if [ -n "$OWNER_PROJECT" ]; then
              echo "::notice::GCS bucket $BUCKET_NAME exists (project number: $OWNER_PROJECT). Terraform will manage if owned by $PROJECT_ID."
            fi
          fi

          echo "Pre-flight check complete."

      - name: Terraform init
        working-directory: ./terraform
        run: |
          set -eu
          cp "${{ steps.env.outputs.ENV_DIR }}/backend.tf" backend.tf
          terraform init -no-color

      - name: Terraform plan
        working-directory: ./terraform
        run: |
          terraform plan -no-color \
            -var-file="${{ steps.env.outputs.VAR_FILE }}" \
            -var="image_tag=v${{ steps.version.outputs.VERSION }}"

      - name: Terraform apply
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve -no-color \
            -var-file="${{ steps.env.outputs.VAR_FILE }}" \
            -var="image_tag=v${{ steps.version.outputs.VERSION }}"

      - name: Collect deployment outputs
        id: tf_out
        working-directory: ./terraform
        run: |
          set -eu
          SERVICE_URL=$(terraform output -raw service_url)
          CUSTOM_URL=$(terraform output -raw custom_domain_url)
          GCS_BUCKET=$(terraform output -raw gcs_bucket_name)
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "CUSTOM_URL=$CUSTOM_URL"   >> "$GITHUB_OUTPUT"
          echo "GCS_BUCKET=$GCS_BUCKET"   >> "$GITHUB_OUTPUT"
          echo "Deployed to: $SERVICE_URL"
          echo "Custom domain: $CUSTOM_URL"
          echo "Artifact bucket: $GCS_BUCKET"

      - name: Smoke test /health
        run: |
          set -eu
          URL="${{ steps.tf_out.outputs.SERVICE_URL }}"
          echo "Smoke-testing $URL/health ..."
          for i in 1 2 3 4 5 ; do
            if curl -fsS "$URL/health" ; then
              echo
              echo "Health check passed on attempt $i."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed for $URL/health after 5 attempts"
          exit 1

      - name: Smoke test /api/ifdb/search
        run: |
          set -eu
          URL="${{ steps.tf_out.outputs.SERVICE_URL }}"
          echo "Smoke-testing $URL/api/ifdb/search?q=zork ..."
          BODY=$(curl -fsS "$URL/api/ifdb/search?q=zork" || true)
          if [ -z "$BODY" ]; then
            echo "::warning::IFDB search returned empty body (upstream may be rate-limited). Not treating as fatal."
            exit 0
          fi
          echo "$BODY" | head -c 500
          echo

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "[${{ steps.env.outputs.ENV_NAME }}] Deployment successful: ${{ steps.tf_out.outputs.SERVICE_URL }}"
            echo "Version deployed: v${{ steps.version.outputs.VERSION }}"
          else
            echo "[${{ steps.env.outputs.ENV_NAME }}] Deployment failed"
          fi
