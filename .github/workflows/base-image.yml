name: Build StoryCloud base image

# Builds and pushes the runtime base image
#   gcr.io/dfh-ops-id/storycloud-base:<FROBTADS_TAG>
# then writes the resulting digest to `docker/base-image.digest` AND
# rewrites the `FROM gcr.io/.../storycloud-base@sha256:...` line in
# `service/Dockerfile` in a single commit. Both files must move in
# lockstep — the FROM line is the real pin consumed by `docker build`;
# the digest file is just a sidecar reference.
#
# Triggers:
#   - workflow_dispatch: manual rebuild (e.g. after bumping FROBTADS_TAG)
#   - push of a tag matching `frobtads/v*`: lets a tag push drive the rebuild
#
# On success, both files are committed back to the same ref (branch
# on workflow_dispatch, default branch on tag push).

on:
  workflow_dispatch:
    inputs:
      frobtads_tag:
        description: "realnc/frobtads git tag to build (e.g. v2.0)"
        required: true
        default: "v2.0"
      target_branch:
        description: "Branch to commit docker/base-image.digest back to"
        required: true
        default: "stage"
  push:
    tags:
      - "frobtads/v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: base-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build, push, record digest
    runs-on: ubuntu-latest

    steps:
      - name: Determine frobtads tag and target branch
        id: inputs
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FROBTADS_TAG='${{ github.event.inputs.frobtads_tag }}'
            TARGET_BRANCH='${{ github.event.inputs.target_branch }}'
          else
            # Tag push: strip the `frobtads/` prefix, commit to default branch.
            FROBTADS_TAG="${GITHUB_REF_NAME#frobtads/}"
            TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          fi
          echo "FROBTADS_TAG=$FROBTADS_TAG"   >> "$GITHUB_OUTPUT"
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REPO=gcr.io/dfh-ops-id/storycloud-base" >> "$GITHUB_OUTPUT"
          echo "Building base image with FROBTADS_TAG=$FROBTADS_TAG, will commit digest to $TARGET_BRANCH"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.inputs.outputs.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud (ops project)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_OPS_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: dfh-ops-id

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build base image
        env:
          IMAGE_REPO:    ${{ steps.inputs.outputs.IMAGE_REPO }}
          FROBTADS_TAG:  ${{ steps.inputs.outputs.FROBTADS_TAG }}
        run: |
          set -eu
          docker build \
            --build-arg "FROBTADS_TAG=${FROBTADS_TAG}" \
            -t "${IMAGE_REPO}:${FROBTADS_TAG}" \
            -t "${IMAGE_REPO}:latest" \
            -f docker/base.Dockerfile docker/

      - name: Push base image (both tags)
        env:
          IMAGE_REPO:    ${{ steps.inputs.outputs.IMAGE_REPO }}
          FROBTADS_TAG:  ${{ steps.inputs.outputs.FROBTADS_TAG }}
        run: |
          set -eu
          docker push "${IMAGE_REPO}:${FROBTADS_TAG}"
          docker push "${IMAGE_REPO}:latest"

      - name: Capture image digest
        id: digest
        env:
          IMAGE_REPO:    ${{ steps.inputs.outputs.IMAGE_REPO }}
          FROBTADS_TAG:  ${{ steps.inputs.outputs.FROBTADS_TAG }}
        run: |
          set -eu
          # `docker inspect` after push reports the repo digest (sha256) of
          # the pushed manifest. Fall back to `gcloud` if needed.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REPO}:${FROBTADS_TAG}" \
                    | sed -E 's|.*@(sha256:[0-9a-f]+)|\1|')
          if [ -z "${DIGEST:-}" ] || [ "${DIGEST#sha256:}" = "$DIGEST" ]; then
            echo "docker inspect did not yield a sha256 digest — falling back to gcloud" >&2
            DIGEST=$(gcloud container images describe \
                      "${IMAGE_REPO}:${FROBTADS_TAG}" \
                      --format='value(image_summary.digest)')
          fi
          test -n "$DIGEST"
          echo "DIGEST=$DIGEST"                                    >> "$GITHUB_OUTPUT"
          echo "IMAGE_PINNED=${IMAGE_REPO}@${DIGEST}"              >> "$GITHUB_OUTPUT"
          echo "Resolved pinned reference: ${IMAGE_REPO}@${DIGEST}"

      - name: Write docker/base-image.digest
        env:
          IMAGE_PINNED: ${{ steps.digest.outputs.IMAGE_PINNED }}
          FROBTADS_TAG: ${{ steps.inputs.outputs.FROBTADS_TAG }}
        run: |
          set -eu
          {
            echo "# Auto-generated by .github/workflows/base-image.yml — do not edit by hand."
            echo "# Bump FROBTADS_TAG in docker/base.Dockerfile + re-run the workflow to update."
            echo "# frobtads_tag: ${FROBTADS_TAG}"
            echo "${IMAGE_PINNED}"
          } > docker/base-image.digest
          cat docker/base-image.digest

      - name: Sync FROM pin in service/Dockerfile
        env:
          IMAGE_PINNED: ${{ steps.digest.outputs.IMAGE_PINNED }}
        run: |
          set -eu
          # service/Dockerfile's `FROM gcr.io/...@sha256:...` line is the *real*
          # pin that drives `docker build`. docker/base-image.digest alone is
          # just a sidecar reference — if the FROM line is not rewritten here,
          # the next service deploy silently rebuilds against the previous
          # base image. Keep them in lockstep.
          TARGET='service/Dockerfile'
          test -f "$TARGET"
          # Must find exactly one FROM line pinning storycloud-base by digest.
          match_count=$(grep -cE '^FROM gcr\.io/dfh-ops-id/storycloud-base@sha256:[0-9a-f]+' "$TARGET" || true)
          if [ "$match_count" != "1" ]; then
            echo "::error::Expected exactly 1 digest-pinned FROM line in $TARGET, found $match_count" >&2
            grep -nE '^FROM ' "$TARGET" >&2 || true
            exit 1
          fi
          sed -i -E \
            "s|^FROM gcr\.io/dfh-ops-id/storycloud-base@sha256:[0-9a-f]+.*|FROM ${IMAGE_PINNED}|" \
            "$TARGET"
          # Verify the rewrite landed on the expected pin.
          grep -F "FROM ${IMAGE_PINNED}" "$TARGET"

      - name: Commit and push digest + FROM sync
        env:
          TARGET_BRANCH: ${{ steps.inputs.outputs.TARGET_BRANCH }}
          FROBTADS_TAG:  ${{ steps.inputs.outputs.FROBTADS_TAG }}
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker/base-image.digest service/Dockerfile
          # `git diff --cached --quiet` returns 0 when the staged index matches HEAD
          # (i.e. nothing new to commit). It correctly covers both "unchanged tracked
          # file" and "file not previously tracked but content identical" — unlike
          # `git diff --quiet <path>`, which ignores untracked files entirely and
          # falsely reports "unchanged" on the very first run.
          if git diff --cached --quiet -- docker/base-image.digest service/Dockerfile; then
            echo "base image digest and service/Dockerfile unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore(base-image): publish frobtads/${FROBTADS_TAG} and pin digest"
          git push origin "HEAD:${TARGET_BRANCH}"
