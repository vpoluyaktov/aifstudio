name: Base image — build and publish toolchain to Docker Hub

# AIFStudio base image pipeline.
#
# This workflow rebuilds the slow-changing IF toolchain image
# (frob built from source, Inform 7 extracted from .deb, apt install set)
# and publishes it to Docker Hub as `vpoluyaktov/aifstudio-base`. The
# per-commit `service/Dockerfile` then derives FROM that image, so its
# build skips the ~10–15 minute toolchain layer entirely.
#
# Triggers:
#   - workflow_dispatch — manual rebuild (use this when bumping tag args
#     in the Dockerfile or rotating Debian base packages).
#   - push to `main` that touches docker/base.Dockerfile or
#     docker/inform7-wrapper.sh — guards against the app workflow trying
#     to use a stale base after a toolchain change is merged.
#
# Output tags:
#   - vpoluyaktov/aifstudio-base:latest
#   - vpoluyaktov/aifstudio-base:frobtads-v2.0-inform7-10.1.2  (immutable
#     toolchain tag; bump in lockstep with the FROBTADS_TAG / INFORM7_DEB_*
#     ARGs and with the FROM line in service/Dockerfile)
#
# This workflow is intentionally separate from main.yml — the main pipeline
# must NOT rebuild the base on every commit, which is the whole reason the
# split exists.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/base.Dockerfile'
      - 'docker/inform7-wrapper.sh'
      - '.github/workflows/base-image.yml'

permissions:
  contents: read

concurrency:
  group: base-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-base:
    name: Build and push base image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/base.Dockerfile
          push: true
          # linux/arm64 deferred — `frob` build-from-source on arm64 has not
          # been validated; revisit when a real arm64 host is in scope.
          platforms: linux/amd64
          tags: |
            vpoluyaktov/aifstudio-base:latest
            vpoluyaktov/aifstudio-base:frobtads-v2.0-inform7-10.1.2
          cache-from: type=gha,scope=aifstudio-base
          cache-to: type=gha,mode=max,scope=aifstudio-base
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=aifstudio-base
            org.opencontainers.image.description=IF toolchain (frotz, glulxe, inform6, frob, inform7) on debian:bookworm-slim

      - name: Image digest summary
        run: |
          {
            echo "## Published base image"
            echo
            echo "| Tag | Value |"
            echo "|-----|-------|"
            echo "| Repository | \`vpoluyaktov/aifstudio-base\` |"
            echo "| Toolchain  | \`frobtads-v2.0-inform7-10.1.2\` |"
            echo "| Latest     | \`vpoluyaktov/aifstudio-base:latest\` |"
            echo "| Digest     | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Commit     | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
