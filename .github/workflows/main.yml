name: CI — lint, test, publish to Docker Hub

# AIFStudio CI pipeline.
#
# Stages: lint → test → docker build → docker push.
# There is no Terraform, no GCP, no SSH-to-host, and no smoke test against
# a live URL. Image publication to Docker Hub is the entire delivery
# surface — operators pull `vpoluyaktov/aifstudio:<version>` and run
# `docker compose up -d` on the target host.
#
# Triggers:
#   - push to any branch  → lint + test
#   - pull request        → lint + test
#   - push to `main`      → lint + test + build + push (`:latest` and
#                           `:MAJOR.MINOR.<commit-count>`)
#   - tag push `v*`       → lint + test + build + push (`:latest` and
#                           `:<tag-without-v>`)

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

permissions:
  contents: read

# Serialize per-ref so back-to-back pushes don't race for the `:latest` tag.
# We never want to skip a commit's image build, so cancel-in-progress: false.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Job 1: lint-and-test — runs on every push and PR.
  # ───────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint, vet, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Guard against forbidden GitHub Actions versions
        run: |
          set -eu
          # Per ~/.claude/rules/template-standards.md, every action reference
          # must be on the Node.js 24-compatible major version. The threshold
          # differs per family — only actions whose CURRENT release is newer
          # than the matched version are flagged.
          fail=0

          # actions/checkout latest is @v4 → forbid @v0-3.
          # actions/setup-go latest is @v5 → forbid @v0-3 (the floor we enforce).
          # actions/cache latest is @v4   → forbid @v0-3.
          if grep -rEn '(actions/checkout|actions/setup-go|actions/cache)@v[0-3]([^0-9]|$)' .github/workflows/ ; then
            fail=1
          fi

          # golangci-lint-action latest is @v6 → forbid @v0-5.
          if grep -rEn 'golangci/golangci-lint-action@v[0-5]([^0-9]|$)' .github/workflows/ ; then
            fail=1
          fi

          # docker/build-push-action latest is @v6 → forbid @v0-5.
          if grep -rEn 'docker/build-push-action@v[0-5]([^0-9]|$)' .github/workflows/ ; then
            fail=1
          fi

          # docker/setup-buildx-action and docker/login-action are at @v3 — that
          # IS the current version, so no guard needed for those.

          if [ "$fail" = "1" ]; then
            echo "::error::Workflow references a forbidden action version. Required: checkout@v4, setup-go@v5, cache@v4, golangci-lint-action@v6, build-push-action@v6, setup-buildx-action@v3, login-action@v3 (see ARCHITECTURE.md §11.3)."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download modules
        working-directory: ./service
        run: go mod download

      - name: go vet
        working-directory: ./service
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./service
          version: latest
          args: --timeout=5m

      - name: go test (with -race)
        working-directory: ./service
        run: go test -race ./...

  # ───────────────────────────────────────────────────────────────────────
  # Job 2: docker-build-and-push — only on push to `main` or `v*` tag.
  # ───────────────────────────────────────────────────────────────────────
  docker-build-and-push:
    name: Build and push image to Docker Hub
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need full history so commit count for MAJOR.MINOR.<count> tags
          # is computable on a `main` push.
          fetch-depth: 0

      - name: Compute image version
        id: version
        run: |
          set -eu
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: use the tag verbatim, stripped of the leading `v`.
            #   refs/tags/v1.2.3 → 1.2.3
            IMAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            # Branch push (main): MAJOR.MINOR from VERSION + commit count.
            #   VERSION=1.0.0, 142 commits → 1.0.142
            BASE_VERSION=$(cat VERSION)
            COMMIT_COUNT=$(git rev-list --all --count HEAD)
            MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1,2)
            IMAGE_VERSION="${MAJOR_MINOR}.${COMMIT_COUNT}"
          fi
          echo "IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building vpoluyaktov/aifstudio:${IMAGE_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./service
          file: ./service/Dockerfile
          push: true
          # linux/arm64 deferred — `frob` build-from-source on arm64 has not
          # been validated; revisit when a real arm64 host is in scope.
          platforms: linux/amd64
          tags: |
            vpoluyaktov/aifstudio:latest
            vpoluyaktov/aifstudio:${{ steps.version.outputs.IMAGE_VERSION }}
          # Bake the version into the image as a label and as APP_VERSION
          # at runtime so /health reports it without needing the operator
          # to set it in `.env`.
          build-args: |
            APP_VERSION=${{ steps.version.outputs.IMAGE_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          {
            echo "## Published image"
            echo
            echo "| Tag | Value |"
            echo "|-----|-------|"
            echo "| Repository | \`vpoluyaktov/aifstudio\` |"
            echo "| Version    | \`${{ steps.version.outputs.IMAGE_VERSION }}\` |"
            echo "| Latest     | \`vpoluyaktov/aifstudio:latest\` |"
            echo "| Digest     | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Commit     | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
